name: Update Articles

on:
  schedule:
    # 매일 09:00 UTC (한국 시간 18:00)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # 수동 실행 가능

permissions:
  contents: write
  pull-requests: write

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  update-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run article update script
        run: pnpm tsx scripts/update-articles.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Check for changes
        id: check-changes
        run: |
          if [[ -n $(git status --porcelain src/content/articles/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and commit
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH_NAME="articles/auto-update-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b $BRANCH_NAME
          git add src/content/articles/
          git commit -m "chore(articles): ${DATE} 아티클 업데이트"
          git push origin $BRANCH_NAME

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: articles/auto-update-${{ github.run_id }}
          delete-branch: true
          title: 'chore(articles): ${{ github.event.repository.updated_at }} 아티클 업데이트'
          body: |
            ## Summary

            - RSS 피드에서 신규 아티클을 수집하고 AI 요약을 생성했습니다.
            - 자동 생성된 PR입니다. 요약 품질을 검토 후 머지해주세요.

            ## Checklist

            - [ ] AI 요약 품질 확인
            - [ ] 링크 유효성 확인

            ---
            🤖 Generated by GitHub Actions
          labels: |
            articles
            automated
