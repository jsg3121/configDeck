name: Update Articles

# v1.6.0 페이즈 6에서 재활성화 (2026-05-11).
# 페이즈 1~5 머지 + 페이즈 6 sample 발행 검증 통과(4/4 환각 0, validateArticle 통과)
# 후 매일 cron 자동 실행을 다시 켠다.
# 새 파이프라인: Editorial Commentary 모델 + 원문 fetch + validateArticle 게이트.
on:
  schedule:
    # 매일 23:37 UTC (한국 시간 08:37)
    - cron: '37 23 * * *'
  workflow_dispatch:
    # 수동 실행 가능 (검증 / 디버깅 / 임시 발행 보충)

permissions:
  contents: write
  pull-requests: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  update-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run article update script
        run: pnpm tsx scripts/update-articles.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check for changes
        id: check-changes
        run: |
          if [[ -n $(git status --porcelain src/content/articles/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: articles/auto-update-${{ github.run_id }}
          base: main
          delete-branch: true
          title: 'chore(articles): 아티클 자동 업데이트'
          body: |
            ## Summary

            - RSS 피드에서 신규 아티클을 수집하고 AI 요약을 생성했습니다.
            - 자동 생성된 PR입니다. 요약 품질을 검토 후 머지해주세요.

            ## Checklist

            - [ ] AI 요약 품질 확인
            - [ ] 링크 유효성 확인

            ---
            🤖 Generated by GitHub Actions
          labels: |
            articles
            automated
          commit-message: 'chore(articles): 아티클 자동 업데이트'
