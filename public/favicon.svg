<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- 뒤쪽 카드 (가장 뒤) -->
  <rect x="28" y="18" width="72" height="88" rx="8" fill="#4F46E5" opacity="0.4"/>

  <!-- 중간 카드 -->
  <rect x="22" y="24" width="72" height="88" rx="8" fill="#6366F1" opacity="0.7"/>

  <!-- 앞쪽 카드 (메인) -->
  <rect x="16" y="30" width="72" height="88" rx="8" fill="url(#cardGradient)"/>

  <!-- 카드 위 작은 점들 (설정 항목 표현) -->
  <circle cx="30" cy="46" r="3" fill="white" opacity="0.8"/>
  <rect x="38" y="43" width="24" height="6" rx="3" fill="white" opacity="0.6"/>

  <circle cx="30" cy="58" r="3" fill="white" opacity="0.8"/>
  <rect x="38" y="55" width="32" height="6" rx="3" fill="white" opacity="0.6"/>

  <!-- 코드 브래킷 { } (하단) -->
  <text x="52" y="100" font-family="monospace" font-size="36" font-weight="bold" fill="#E0D4FC" text-anchor="middle">{}</text>

  <style>
    @media (prefers-color-scheme: dark) {
      rect:first-of-type { fill: #6366F1; }
    }
  </style>
</svg>
