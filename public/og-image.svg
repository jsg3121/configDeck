<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- 파비콘 아이콘 (왼쪽) -->
  <g transform="translate(280, 175) scale(2.2)">
    <!-- 뒤쪽 카드 -->
    <rect x="28" y="18" width="72" height="88" rx="8" fill="#4F46E5" opacity="0.4"/>
    <!-- 중간 카드 -->
    <rect x="22" y="24" width="72" height="88" rx="8" fill="#6366F1" opacity="0.7"/>
    <!-- 앞쪽 카드 -->
    <rect x="16" y="30" width="72" height="88" rx="8" fill="url(#cardGradient)"/>
    <!-- 말머리 라인 -->
    <circle cx="30" cy="46" r="3" fill="white" opacity="0.8"/>
    <rect x="38" y="43" width="24" height="6" rx="3" fill="white" opacity="0.6"/>
    <circle cx="30" cy="58" r="3" fill="white" opacity="0.8"/>
    <rect x="38" y="55" width="32" height="6" rx="3" fill="white" opacity="0.6"/>
    <!-- 브래킷 -->
    <text x="52" y="100" font-family="monospace" font-size="36" font-weight="bold" fill="#E0D4FC" text-anchor="middle">{}</text>
  </g>

  <!-- 서비스 이름 (오른쪽) -->
  <text x="580" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">ConfigDeck</text>

  <!-- 태그라인 -->
  <text x="580" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#A5B4FC">Build your config files with ease</text>
</svg>
