<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfigDeck Stack Generator — UI Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            'primary-hover': '#2563eb',
            surface: '#ffffff',
            'surface-alt': '#f8fafc',
            border: '#e2e8f0',
            'code-bg': '#1e293b',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .code-font { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    pre { white-space: pre; tab-size: 2; }
    .file-item.active { background: #eff6ff; border-color: #3b82f6; }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .accordion-content.open { max-height: 600px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 시안 전환 탭 -->
<div class="bg-white border-b border-border sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
    <span class="text-sm font-semibold text-gray-500">ConfigDeck Stack Generator — UI Prototype</span>
    <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
      <button onclick="switchPrototype('A')" id="proto-tab-A" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm">시안 A</button>
      <button onclick="switchPrototype('B')" id="proto-tab-B" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700">시안 B</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- 시안 A: 좌측 파일 리스트 + 우측 미리보기/옵션 탭 전환 -->
<!-- ============================================================ -->
<div id="prototype-A" class="max-w-7xl mx-auto">
  <!-- 상단: 스택 프리셋 -->
  <div class="px-6 pt-6 pb-4 border-b border-border bg-white">
    <h2 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3">스택 프리셋</h2>
    <div class="flex gap-2 flex-wrap">
      <button onclick="selectStackA('react')" class="stack-btn-a px-4 py-2 rounded-lg border text-sm font-medium border-primary bg-primary text-white" data-stack="react">React + Vite + TS</button>
      <button onclick="selectStackA('nextjs')" class="stack-btn-a px-4 py-2 rounded-lg border text-sm font-medium border-border text-gray-600 hover:border-primary hover:text-primary" data-stack="nextjs">Next.js + TS</button>
      <button onclick="selectStackA('astro')" class="stack-btn-a px-4 py-2 rounded-lg border text-sm font-medium border-border text-gray-600 hover:border-primary hover:text-primary" data-stack="astro">Astro + TS</button>
      <button onclick="selectStackA('node')" class="stack-btn-a px-4 py-2 rounded-lg border text-sm font-medium border-border text-gray-600 hover:border-primary hover:text-primary" data-stack="node">Node API + TS</button>
    </div>
  </div>

  <div class="flex" style="height: calc(100vh - 180px);">
    <!-- 좌측: 파일 리스트 -->
    <div class="w-72 border-r border-border bg-white overflow-y-auto shrink-0">
      <div class="p-4">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3">포함 파일</h3>
        <div id="file-list-a" class="flex flex-col gap-1.5"></div>
      </div>
    </div>

    <!-- 우측: 미리보기/옵션 탭 -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- 탭 바 -->
      <div class="flex border-b border-border bg-white px-4">
        <button onclick="switchRightTabA('preview')" id="right-tab-preview" class="px-4 py-3 text-sm font-medium border-b-2 border-primary text-primary">미리보기</button>
        <button onclick="switchRightTabA('options')" id="right-tab-options" class="px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">옵션</button>
        <div class="ml-auto flex items-center gap-2">
          <button class="px-3 py-1.5 text-xs rounded-md border border-border text-gray-500 hover:text-primary hover:border-primary">복사</button>
          <button class="px-3 py-1.5 text-xs rounded-md bg-primary text-white hover:bg-primary-hover">ZIP 다운로드</button>
        </div>
      </div>

      <!-- 미리보기 패널 -->
      <div id="panel-preview-a" class="flex-1 bg-code-bg overflow-auto">
        <pre id="code-preview-a" class="code-font text-sm text-gray-300 p-6"></pre>
      </div>

      <!-- 옵션 패널 -->
      <div id="panel-options-a" class="flex-1 bg-white overflow-auto hidden">
        <div id="options-form-a" class="p-6 max-w-xl"></div>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- 시안 B: 좌측 아코디언 인라인 옵션 + 우측 미리보기 -->
<!-- ============================================================ -->
<div id="prototype-B" class="max-w-7xl mx-auto hidden">
  <!-- 상단: 스택 프리셋 -->
  <div class="px-6 pt-6 pb-4 border-b border-border bg-white">
    <h2 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3">스택 프리셋</h2>
    <div class="flex gap-2 flex-wrap">
      <button onclick="selectStackB('react')" class="stack-btn-b px-4 py-2 rounded-lg border text-sm font-medium border-primary bg-primary text-white" data-stack="react">React + Vite + TS</button>
      <button onclick="selectStackB('nextjs')" class="stack-btn-b px-4 py-2 rounded-lg border text-sm font-medium border-border text-gray-600 hover:border-primary hover:text-primary" data-stack="nextjs">Next.js + TS</button>
      <button onclick="selectStackB('astro')" class="stack-btn-b px-4 py-2 rounded-lg border text-sm font-medium border-border text-gray-600 hover:border-primary hover:text-primary" data-stack="astro">Astro + TS</button>
      <button onclick="selectStackB('node')" class="stack-btn-b px-4 py-2 rounded-lg border text-sm font-medium border-border text-gray-600 hover:border-primary hover:text-primary" data-stack="node">Node API + TS</button>
    </div>
  </div>

  <div class="flex" style="height: calc(100vh - 180px);">
    <!-- 좌측: 아코디언 -->
    <div class="w-96 border-r border-border bg-white overflow-y-auto shrink-0">
      <div id="accordion-list-b" class="divide-y divide-border"></div>
    </div>

    <!-- 우측: 파일 탭 + 미리보기 -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- 파일 탭 바 -->
      <div class="flex border-b border-border bg-code-bg overflow-x-auto">
        <div id="file-tabs-b" class="flex"></div>
        <div class="ml-auto flex items-center gap-2 px-4">
          <button class="px-3 py-1.5 text-xs rounded-md border border-gray-600 text-gray-400 hover:text-white hover:border-gray-400">복사</button>
          <button class="px-3 py-1.5 text-xs rounded-md bg-primary text-white hover:bg-primary-hover">ZIP 다운로드</button>
        </div>
      </div>

      <!-- 미리보기 -->
      <div class="flex-1 bg-code-bg overflow-auto">
        <pre id="code-preview-b" class="code-font text-sm text-gray-300 p-6"></pre>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 데이터
// ============================================================
const STACKS = {
  react: {
    files: [
      { name: '.gitignore', preset: 'Node', icon: '📄' },
      { name: 'tsconfig.json', preset: 'React + Vite', icon: '🔷' },
      { name: 'eslint.config.mjs', preset: 'TypeScript Strict', icon: '🟪' },
      { name: 'prettier.config.mjs', preset: 'Airbnb-like', icon: '🎨' },
      { name: 'vite.config.ts', preset: 'React', icon: '⚡' },
      { name: 'vitest.config.ts', preset: 'React', icon: '🧪' },
      { name: '.editorconfig', preset: 'Standard', icon: '⚙️' },
    ]
  },
  nextjs: {
    files: [
      { name: '.gitignore', preset: 'Node', icon: '📄' },
      { name: 'tsconfig.json', preset: 'Next.js', icon: '🔷' },
      { name: 'eslint.config.mjs', preset: 'Next.js', icon: '🟪' },
      { name: 'prettier.config.mjs', preset: 'Airbnb-like', icon: '🎨' },
      { name: 'next.config.js', preset: 'Standard', icon: '▲' },
      { name: '.editorconfig', preset: 'Standard', icon: '⚙️' },
    ]
  },
  astro: {
    files: [
      { name: '.gitignore', preset: 'Node', icon: '📄' },
      { name: 'tsconfig.json', preset: 'Astro', icon: '🔷' },
      { name: 'eslint.config.mjs', preset: 'TypeScript Strict', icon: '🟪' },
      { name: 'prettier.config.mjs', preset: 'Standard JS', icon: '🎨' },
      { name: '.editorconfig', preset: 'Standard', icon: '⚙️' },
    ]
  },
  node: {
    files: [
      { name: '.gitignore', preset: 'Node', icon: '📄' },
      { name: 'tsconfig.json', preset: 'Node 20', icon: '🔷' },
      { name: 'eslint.config.mjs', preset: 'TypeScript Strict', icon: '🟪' },
      { name: 'prettier.config.mjs', preset: 'Prettier Default', icon: '🎨' },
      { name: '.env', preset: 'Backend', icon: '🔐' },
      { name: '.editorconfig', preset: 'Standard', icon: '⚙️' },
    ]
  },
};

const SAMPLE_CODE = {
  '.gitignore': `# Dependencies
node_modules/
npm-debug.log*
yarn-error.log*
pnpm-debug.log*

# Build output
dist/
build/
.output/

# Environment
.env
.env.local
.env.*.local

# macOS
.DS_Store

# VS Code
.vscode/
*.code-workspace`,
  'tsconfig.json': `{
  "compilerOptions": {
    "target": "ES2022",
    "module": "ESNext",
    "moduleResolution": "Bundler",
    "jsx": "react-jsx",
    "strict": true,
    "esModuleInterop": true,
    "skipLibCheck": true,
    "forceConsistentCasingInFileNames": true,
    "resolveJsonModule": true,
    "isolatedModules": true,
    "noEmit": true,
    "baseUrl": ".",
    "paths": {
      "@/*": ["src/*"]
    }
  },
  "include": ["src"],
  "exclude": ["node_modules", "dist"]
}`,
  'eslint.config.mjs': `import tseslint from 'typescript-eslint'
import react from 'eslint-plugin-react'
import reactHooks from 'eslint-plugin-react-hooks'
import importPlugin from 'eslint-plugin-import'
import prettierConfig from 'eslint-config-prettier'

export default [
  ...tseslint.configs.recommended,
  ...react.configs.flat.recommended,
  {
    plugins: {
      'react-hooks': reactHooks,
      import: importPlugin,
    },
    rules: {
      'no-console': 'warn',
      '@typescript-eslint/no-unused-vars': 'error',
      'prefer-const': 'error',
      'eqeqeq': 'error',
      'no-var': 'error',
      'no-debugger': 'error',
    },
  },
  prettierConfig,
]`,
  'prettier.config.mjs': `/** @type {import("prettier").Config} */
export default {
  printWidth: 100,
  tabWidth: 2,
  singleQuote: true,
  trailingComma: 'all',
  arrowParens: 'always',
  endOfLine: 'lf',
}`,
  'vite.config.ts': `import react from '@vitejs/plugin-react'
import { resolve } from 'path'
import { defineConfig } from 'vite'

export default defineConfig({
  plugins: [react()],
  resolve: {
    alias: {
      '@': resolve(__dirname, 'src'),
    },
  },
})`,
  'vitest.config.ts': `import { defineConfig } from 'vitest/config'

export default defineConfig({
  test: {
    environment: 'jsdom',
    globals: true,
    setupFiles: ['./src/test/setup.ts'],
  },
})`,
  '.editorconfig': `root = true

[*]
indent_style = space
indent_size = 2
end_of_line = lf
charset = utf-8
trim_trailing_whitespace = true
insert_final_newline = true

[*.md]
trim_trailing_whitespace = false`,
  'next.config.js': `/** @type {import('next').NextConfig} */
const nextConfig = {
  reactStrictMode: true,
  images: {
    formats: ['image/avif', 'image/webp'],
  },
}

module.exports = nextConfig`,
  '.env': `# App
PORT=3000
NODE_ENV=development

# Database
DATABASE_URL=postgresql://user:password@localhost:5432/mydb

# Auth
JWT_SECRET=your-jwt-secret-here
SESSION_SECRET=your-session-secret-here`,
};

const FILE_OPTIONS = {
  'tsconfig.json': [
    { section: '언어 & 환경', controls: [
      { type: 'select', label: '대상 버전', key: 'target', options: ['ES2017','ES2020','ES2022','ES2023','ESNext'], value: 'ES2022' },
      { type: 'select', label: '모듈 시스템', key: 'module', options: ['ESNext','NodeNext','CommonJS','Preserve'], value: 'ESNext' },
      { type: 'select', label: '모듈 해석', key: 'moduleResolution', options: ['Bundler','NodeNext','Node'], value: 'Bundler' },
      { type: 'select', label: 'JSX', key: 'jsx', options: ['(없음)','react-jsx','preserve','react'], value: 'react-jsx' },
    ]},
    { section: '타입 검사', controls: [
      { type: 'checkbox', label: 'strict 모드', key: 'strict', checked: true },
      { type: 'checkbox', label: 'JSON import 허용', key: 'resolveJsonModule', checked: true },
      { type: 'checkbox', label: '격리 모듈', key: 'isolatedModules', checked: true },
    ]},
  ],
  'eslint.config.mjs': [
    { section: '언어 & 프레임워크', controls: [
      { type: 'select', label: '언어', key: 'language', options: ['TypeScript','JavaScript'], value: 'TypeScript' },
      { type: 'select', label: '프레임워크', key: 'framework', options: ['None','React','Vue','Next.js','Svelte','Astro'], value: 'React' },
    ]},
    { section: '플러그인', controls: [
      { type: 'checkbox', label: 'Prettier 연동', key: 'prettier', checked: true },
      { type: 'checkbox', label: 'Import 정렬', key: 'import', checked: true },
    ]},
    { section: '주요 규칙', controls: [
      { type: 'select', label: 'no-console', key: 'noConsole', options: ['off','warn','error'], value: 'warn' },
      { type: 'select', label: 'no-unused-vars', key: 'noUnusedVars', options: ['off','warn','error'], value: 'error' },
      { type: 'select', label: 'prefer-const', key: 'preferConst', options: ['off','warn','error'], value: 'error' },
      { type: 'select', label: 'eqeqeq', key: 'eqeqeq', options: ['off','warn','error'], value: 'error' },
    ]},
  ],
  'prettier.config.mjs': [
    { section: '기본 포맷팅', controls: [
      { type: 'number', label: '줄 너비', key: 'printWidth', value: 100, quickValues: [80,100,120] },
      { type: 'number', label: '탭 크기', key: 'tabWidth', value: 2, quickValues: [2,4] },
      { type: 'checkbox', label: '작은따옴표', key: 'singleQuote', checked: true },
      { type: 'checkbox', label: '세미콜론', key: 'semi', checked: true },
      { type: 'select', label: '후행 쉼표', key: 'trailingComma', options: ['all','es5','none'], value: 'all' },
    ]},
  ],
  'vite.config.ts': [
    { section: '프레임워크', controls: [
      { type: 'select', label: '플러그인', key: 'framework', options: ['None','React','Vue','Svelte'], value: 'React' },
    ]},
    { section: '옵션', controls: [
      { type: 'checkbox', label: '경로 별칭 (@/ → src/)', key: 'pathAlias', checked: true },
      { type: 'checkbox', label: '소스맵', key: 'sourcemap', checked: false },
    ]},
  ],
  '.gitignore': [
    { section: '의존성 & 빌드', controls: [
      { type: 'checkbox', label: 'Node.js (node_modules)', key: 'node', checked: true },
      { type: 'checkbox', label: '빌드 출력 (dist)', key: 'build', checked: true },
      { type: 'checkbox', label: '환경 변수 (.env)', key: 'env', checked: true },
    ]},
    { section: 'OS & 에디터', controls: [
      { type: 'checkbox', label: 'macOS (.DS_Store)', key: 'macos', checked: true },
      { type: 'checkbox', label: 'VS Code (.vscode)', key: 'vscode', checked: true },
    ]},
  ],
};

// ============================================================
// 시안 전환
// ============================================================
function switchPrototype(id) {
  document.getElementById('prototype-A').classList.toggle('hidden', id !== 'A');
  document.getElementById('prototype-B').classList.toggle('hidden', id !== 'B');
  document.getElementById('proto-tab-A').className = id === 'A'
    ? 'px-4 py-1.5 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm'
    : 'px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700';
  document.getElementById('proto-tab-B').className = id === 'B'
    ? 'px-4 py-1.5 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm'
    : 'px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700';
}

// ============================================================
// 시안 A
// ============================================================
let currentStackA = 'react';
let selectedFileA = '';

function selectStackA(stack) {
  currentStackA = stack;
  document.querySelectorAll('.stack-btn-a').forEach(btn => {
    const isActive = btn.dataset.stack === stack;
    btn.className = `stack-btn-a px-4 py-2 rounded-lg border text-sm font-medium ${isActive ? 'border-primary bg-primary text-white' : 'border-border text-gray-600 hover:border-primary hover:text-primary'}`;
  });
  renderFileListA();
}

function renderFileListA() {
  const list = document.getElementById('file-list-a');
  const files = STACKS[currentStackA].files;
  selectedFileA = files[0].name;
  list.innerHTML = files.map(f => `
    <button onclick="selectFileA('${f.name}')" class="file-item w-full text-left px-3 py-2.5 rounded-lg border border-transparent hover:bg-gray-50 flex items-center gap-3 ${f.name === selectedFileA ? 'active !border-primary !bg-blue-50' : ''}" data-file="${f.name}">
      <span class="text-base">${f.icon}</span>
      <div class="min-w-0 flex-1">
        <div class="code-font text-sm text-gray-800 truncate">${f.name}</div>
        <div class="text-xs text-gray-400 mt-0.5">프리셋: ${f.preset}</div>
      </div>
      <input type="checkbox" checked class="h-4 w-4 accent-primary shrink-0" onclick="event.stopPropagation()">
    </button>
  `).join('');
  updatePreviewA();
  updateOptionsA();
}

function selectFileA(name) {
  selectedFileA = name;
  document.querySelectorAll('#file-list-a .file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.file === name);
    el.classList.toggle('!border-primary', el.dataset.file === name);
    el.classList.toggle('!bg-blue-50', el.dataset.file === name);
  });
  updatePreviewA();
  updateOptionsA();
}

function updatePreviewA() {
  document.getElementById('code-preview-a').textContent = SAMPLE_CODE[selectedFileA] || '// No preview available';
}

function updateOptionsA() {
  const form = document.getElementById('options-form-a');
  const options = FILE_OPTIONS[selectedFileA];
  if (!options) {
    form.innerHTML = `<p class="text-sm text-gray-400">이 파일은 프리셋 기반으로 생성됩니다. 세부 옵션 조정이 필요하면 <a href="#" class="text-primary hover:underline">개별 생성기 페이지</a>를 이용하세요.</p>`;
    return;
  }
  form.innerHTML = `<h3 class="code-font text-lg font-semibold mb-4">${selectedFileA}</h3>` + options.map(section => `
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-3">
        <div class="h-px flex-1 bg-border"></div>
        <span class="text-xs font-semibold uppercase tracking-wider text-gray-400 shrink-0">${section.section}</span>
        <div class="h-px flex-1 bg-border"></div>
      </div>
      <div class="flex flex-col gap-3">
        ${section.controls.map(c => renderControl(c)).join('')}
      </div>
    </div>
  `).join('');
}

function switchRightTabA(tab) {
  const isPreview = tab === 'preview';
  document.getElementById('panel-preview-a').classList.toggle('hidden', !isPreview);
  document.getElementById('panel-options-a').classList.toggle('hidden', isPreview);
  document.getElementById('right-tab-preview').className = `px-4 py-3 text-sm font-medium border-b-2 ${isPreview ? 'border-primary text-primary' : 'border-transparent text-gray-500 hover:text-gray-700'}`;
  document.getElementById('right-tab-options').className = `px-4 py-3 text-sm font-medium border-b-2 ${!isPreview ? 'border-primary text-primary' : 'border-transparent text-gray-500 hover:text-gray-700'}`;
}

// ============================================================
// 시안 B
// ============================================================
let currentStackB = 'react';
let selectedFileB = '';
let openAccordionB = '';

function selectStackB(stack) {
  currentStackB = stack;
  document.querySelectorAll('.stack-btn-b').forEach(btn => {
    const isActive = btn.dataset.stack === stack;
    btn.className = `stack-btn-b px-4 py-2 rounded-lg border text-sm font-medium ${isActive ? 'border-primary bg-primary text-white' : 'border-border text-gray-600 hover:border-primary hover:text-primary'}`;
  });
  renderAccordionB();
}

function renderAccordionB() {
  const container = document.getElementById('accordion-list-b');
  const files = STACKS[currentStackB].files;
  selectedFileB = files[0].name;
  openAccordionB = files[0].name;

  container.innerHTML = files.map(f => {
    const options = FILE_OPTIONS[f.name];
    const isOpen = f.name === openAccordionB;
    return `
    <div class="accordion-item" data-file="${f.name}">
      <button onclick="toggleAccordionB('${f.name}')" class="w-full px-4 py-4 flex items-center gap-3 hover:bg-gray-50 ${isOpen ? 'bg-blue-50' : ''}">
        <input type="checkbox" checked class="h-4 w-4 accent-primary shrink-0" onclick="event.stopPropagation()">
        <span class="text-base">${f.icon}</span>
        <div class="flex-1 text-left min-w-0">
          <span class="code-font text-sm font-semibold text-gray-800">${f.name}</span>
        </div>
        <span class="text-xs text-gray-400 shrink-0">${f.preset}</span>
        <svg class="w-4 h-4 text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div class="accordion-content ${isOpen ? 'open' : ''}" style="${isOpen ? 'max-height:600px' : ''}">
        <div class="px-4 pb-4 pt-2">
          ${options ? options.map(section => `
            <div class="mb-4">
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">${section.section}</p>
              <div class="flex flex-col gap-2">
                ${section.controls.map(c => renderControl(c)).join('')}
              </div>
            </div>
          `).join('') : '<p class="text-xs text-gray-400">프리셋 기반으로 생성됩니다.</p>'}
        </div>
      </div>
    </div>
  `}).join('');

  renderFileTabsB();
  updatePreviewB();
}

function toggleAccordionB(name) {
  const wasOpen = openAccordionB === name;
  openAccordionB = wasOpen ? '' : name;
  selectedFileB = wasOpen ? selectedFileB : name;

  document.querySelectorAll('.accordion-item').forEach(item => {
    const isThis = item.dataset.file === name;
    const content = item.querySelector('.accordion-content');
    const btn = item.querySelector('button');
    const svg = item.querySelector('svg');

    if (isThis && !wasOpen) {
      content.classList.add('open');
      content.style.maxHeight = '600px';
      btn.classList.add('bg-blue-50');
      svg.classList.add('rotate-180');
    } else {
      content.classList.remove('open');
      content.style.maxHeight = '0';
      btn.classList.remove('bg-blue-50');
      svg.classList.remove('rotate-180');
    }
  });

  renderFileTabsB();
  updatePreviewB();
}

function renderFileTabsB() {
  const tabs = document.getElementById('file-tabs-b');
  const files = STACKS[currentStackB].files;
  tabs.innerHTML = files.map(f => `
    <button onclick="selectFileTabB('${f.name}')" class="px-4 py-2.5 text-xs whitespace-nowrap border-b-2 code-font ${f.name === selectedFileB ? 'border-primary text-primary bg-gray-800/50' : 'border-transparent text-gray-500 hover:text-gray-300'}">${f.name}</button>
  `).join('');
}

function selectFileTabB(name) {
  selectedFileB = name;
  if (openAccordionB !== name) {
    toggleAccordionB(name);
  }
  renderFileTabsB();
  updatePreviewB();
}

function updatePreviewB() {
  document.getElementById('code-preview-b').textContent = SAMPLE_CODE[selectedFileB] || '// No preview available';
}

// ============================================================
// 컨트롤 렌더링 헬퍼
// ============================================================
function renderControl(c) {
  if (c.type === 'checkbox') {
    return `
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" ${c.checked ? 'checked' : ''} class="h-4 w-4 accent-primary">
        <span class="text-sm text-gray-700">${c.label}</span>
      </label>`;
  }
  if (c.type === 'select') {
    return `
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-700 w-28 shrink-0">${c.label}</span>
        <select class="flex-1 text-sm border border-border rounded-md px-2 py-1.5 bg-white text-gray-700">
          ${c.options.map(o => `<option ${o === c.value ? 'selected' : ''}>${o}</option>`).join('')}
        </select>
      </div>`;
  }
  if (c.type === 'number') {
    return `
      <div>
        <div class="flex items-center gap-3">
          <span class="text-sm text-gray-700 w-28 shrink-0">${c.label}</span>
          <input type="number" value="${c.value}" class="w-20 text-sm border border-border rounded-md px-2 py-1.5 bg-white text-gray-700">
        </div>
        ${c.quickValues ? `<div class="flex gap-1.5 mt-1.5 ml-[7.75rem]">${c.quickValues.map(v => `<button class="px-2.5 py-1 text-xs rounded-md border ${v === c.value ? 'border-primary bg-blue-50 text-primary' : 'border-border text-gray-500 hover:border-gray-300'}">${v}</button>`).join('')}</div>` : ''}
      </div>`;
  }
  return '';
}

// ============================================================
// 초기화
// ============================================================
renderFileListA();
renderAccordionB();
</script>

</body>
