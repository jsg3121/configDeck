have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - 'pnpm-lock.yaml'
  - 'package-lock.json'
  - 'yarn.lock'
  - 'dist/**'
  - '.astro/**'
  - 'node_modules/**'
  - 'src/content/articles/**'
  - 'public/og/**'
  - '.claude/research/reports/**'
  - '**/*.snap'
